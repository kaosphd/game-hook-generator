<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Game Hook Generator v1.0</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <h1>Game Hook & Scenario Seed Generator</h1>

  <div class="generator">

        <button onclick="generate('Who', 'whoOutput')">
      You are (character type)
    </button>
    <div id="whoOutput" class="output"></div>
    
    <button onclick="generate('Where', 'whereOutput')">
      In (setting)
    </button>
    <div id="whereOutput" class="output"></div>

    <button onclick="generate('When', 'whenOutput')">
      When (era)
    </button>
    <div id="whenOutput" class="output"></div>

    <button onclick="generate('What', 'whatOutput')">
      Trying to... (achieve X)
    </button>
    <div id="whatOutput" class="output"></div>

    <button onclick="generate('Why', 'whyOutput')">
      In order to... (the ultimate goal or aim)
    </button>
    <div id="whyOutput" class="output"></div>

    <button onclick="generate('How', 'howOutput')">
      By...
    </button>
    <div id="howOutput" class="output"></div>

     <button onclick="generate('WorkingIn', 'workingInOutput')">
     Working as...
    </button>
    <div id="workingInOutput" class="output"></div>

     <button onclick="generate('Adjective', 'adjectiveOutput')">
      With X tone or feeling.
    </button>
    <div id="howOutput" class="output"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
