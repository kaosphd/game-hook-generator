<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Game Hook Generator v1.0</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <h1>Game Hook & Scenario Seed Generator</h1>

  <div class="generator">

    <button class="who" onclick="generate('Who', 'whoOutput')">
      You are...
    </button>
    <div id="whoOutput" class="output"></div>


    <button class="where" onclick="generate('Where', 'whereOutput')">
      In...
    </button>
    <div id="whereOutput" class="output"></div>


    <button class="when" onclick="generate('When', 'whenOutput')">
      When...
    </button>
    <div id="whenOutput" class="output"></div>


    <button class="what" onclick="generate('What', 'whatOutput')">
      Trying to...
    </button>
    <div id="whatOutput" class="output"></div>


    <button class="why" onclick="generate('Why', 'whyOutput')">
      In order to...
    </button>
    <div id="whyOutput" class="output"></div>


    <button class="how" onclick="generate('How', 'howOutput')">
      By...
    </button>
    <div id="howOutput" class="output"></div>


    <button class="working" onclick="generate('WorkingIn', 'workingInOutput')">
      Working as...
    </button>
    <div id="workingInOutput" class="output"></div>


    <button class="tone" onclick="generate('Adjective', 'adjectiveOutput')">
      With tone or feeling...
    </button>
    <div id="adjectiveOutput" class="output"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
